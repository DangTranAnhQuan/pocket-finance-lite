name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Lint (ktlint) + Static analysis (detekt)
        run: ./gradlew ktlintCheck detekt

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build debug
        run: ./gradlew assembleDebug
